<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-labelledby="title desc">
  <title id="title">Water electrolysis with gas collection</title>
  <desc id="desc">Electrolysis of water using baking soda electrolyte with inverted tubes collecting hydrogen and oxygen by water displacement.</desc>
  <defs>
    <marker id="arrowTeal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#0d9488"/>
    </marker>
  </defs>
  <rect width="720" height="460" fill="#f8fafc"/>
  <text x="360" y="28" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Session 4 - Water electrolysis + gas collection</text>

  <!-- Tub -->
  <rect x="120" y="140" width="480" height="220" rx="8" fill="#e0f2fe" stroke="#64748b" stroke-width="2"/>
  <text x="360" y="175" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#0369a1">Water + baking soda (NOT salt)</text>

  <!-- Left tube H&#x2082; - fills faster -->
  <rect x="220" y="80" width="56" height="200" rx="4" fill="#fff" stroke="#64748b" stroke-width="1.5"/>
  <rect x="224" y="140" width="48" height="136" fill="#bae6fd" opacity="0.5"/>
  <rect x="224" y="80" width="48" height="60" fill="#fef9c3" opacity="0.85"/>
  <text x="248" y="108" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#854d0e">H&#x2082;</text>
  <text x="248" y="122" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#64748b">2&#x00d7; volume</text>

  <!-- Right tube O&#x2082; -->
  <rect x="440" y="80" width="56" height="200" rx="4" fill="#fff" stroke="#64748b" stroke-width="1.5"/>
  <rect x="444" y="170" width="48" height="106" fill="#bae6fd" opacity="0.5"/>
  <rect x="444" y="120" width="48" height="50" fill="#fce7f3" opacity="0.85"/>
  <text x="468" y="142" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#9d174d">O&#x2082;</text>

  <!-- Electrodes -->
  <rect x="245" y="280" width="8" height="70" fill="#334155"/>
  <rect x="463" y="280" width="8" height="70" fill="#334155"/>
  <text x="249" y="365" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#334155">Graphite</text>
  <text x="249" y="378" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#0d9488">cathode (&#x2212;)</text>
  <text x="467" y="365" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#334155">Graphite</text>
  <text x="467" y="378" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#dc2626">anode (+)</text>

  <!-- Bubbles -->
  <circle cx="249" cy="250" r="3" fill="#94a3b8" opacity="0.7"/>
  <circle cx="255" cy="235" r="2" fill="#94a3b8" opacity="0.7"/>
  <circle cx="467" cy="260" r="3" fill="#94a3b8" opacity="0.7"/>

  <!-- Battery -->
  <rect x="330" y="380" width="60" height="36" rx="4" fill="#fef3c7" stroke="#334155"/>
  <text x="360" y="402" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700">9V DC</text>
  <path d="M249 350 L249 398 L330 398" stroke="#334155" stroke-width="2" fill="none"/>
  <path d="M467 350 L467 398 L390 398" stroke="#dc2626" stroke-width="2" fill="none"/>

  <!-- Water level label -->
  <line x1="130" y1="200" x2="590" y2="200" stroke="#0d9488" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="600" y="204" font-family="Segoe UI, sans-serif" font-size="9" fill="#64748b">water line</text>

  <!-- Instructions box -->
  <rect x="24" y="410" width="672" height="42" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="360" y="432" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#334155">Fill tubes completely with water, invert underwater - measure gas volume over time</text>
  <text x="360" y="448" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">Expected ratio V(H&#x2082;) : V(O&#x2082;) &#x2248; 2 : 1</text>
</svg>
