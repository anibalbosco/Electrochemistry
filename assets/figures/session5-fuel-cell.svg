<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" role="img" aria-labelledby="title desc">
  <title id="title">PEM fuel cell schematic</title>
  <desc id="desc">Simplified proton exchange membrane fuel cell converting hydrogen and oxygen into electricity and water.</desc>
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#0d9488"/>
    </marker>
  </defs>
  <rect width="720" height="400" fill="#f8fafc"/>
  <text x="360" y="28" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Session 5  PEM fuel cell (simplified)</text>

  <!-- Fuel cell body -->
  <rect x="180" y="100" width="360" height="160" rx="10" fill="#fff" stroke="#64748b" stroke-width="2"/>
  <rect x="350" y="110" width="20" height="140" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5"/>
  <text x="360" y="185" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#0f766e">PEM</text>

  <!-- H2 in -->
  <rect x="80" y="155" width="70" height="50" rx="6" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="115" y="175" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#854d0e">H� in</text>
  <text x="115" y="192" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#64748b">fuel</text>
  <path d="M150 180 L180 180" stroke="#854d0e" stroke-width="2" marker-end="url(#arrowTeal)"/>

  <!-- O2 in -->
  <rect x="570" y="155" width="70" height="50" rx="6" fill="#fce7f3" stroke="#db2777"/>
  <text x="605" y="175" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#9d174d">O� in</text>
  <text x="605" y="192" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#64748b">oxidant</text>
  <path d="M570 180 L540 180" stroke="#9d174d" stroke-width="2" marker-end="url(#arrowTeal)"/>

  <!-- Anode side -->
  <text x="250" y="125" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">Anode</text>
  <text x="250" y="240" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#475569">H� � 2Hz + 2e{</text>

  <!-- Cathode side -->
  <text x="470" y="125" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">Cathode</text>
  <text x="470" y="240" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#475569">�O� + 2Hz + 2e{ � H�O</text>

  <!-- External circuit -->
  <path d="M250 100 L250 60 L470 60 L470 100" stroke="#334155" stroke-width="2.5" fill="none"/>
  <path d="M300 60 L420 60" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="360" y="52" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#dc2626">e{ � electricity</text>

  <!-- Load -->
  <rect x="310" y="68" width="100" height="36" rx="5" fill="#ecfdf5" stroke="#22c55e"/>
  <text x="360" y="90" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#166534">LED / fan</text>

  <!-- H2O out -->
  <path d="M360 260 L360 290" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <text x="360" y="310" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#2563eb">H�O out</text>

  <!-- Two modes box -->
  <rect x="24" y="330" width="672" height="58" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="40" y="352" font-family="Segoe UI, sans-serif" font-size="11" fill="#334155">Reversible kit  Mode 1 (electrolyzer): electricity in � split water � store H�/O�  (Session 4)</text>
  <text x="40" y="372" font-family="Segoe UI, sans-serif" font-size="11" fill="#334155">Mode 2 (fuel cell): H� + O� in � electricity out + water  (reverse of electrolysis)</text>
</svg>
