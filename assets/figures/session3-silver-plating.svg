<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="title desc">
  <title id="title">Silver plating cell with ammeter</title>
  <desc id="desc">Electrolytic silver plating setup with multimeter in series to measure current for Faraday's law calculations.</desc>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="720" height="440" fill="#f8fafc"/>
  <text x="360" y="28" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Session 3  Silver plating with current measurement</text>

  <!-- Beaker -->
  <path d="M200 130 L200 320 L520 320 L520 130" fill="none" stroke="#64748b" stroke-width="2"/>
  <rect x="202" y="190" width="316" height="128" fill="#f1f5f9" opacity="0.9"/>
  <text x="360" y="255" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#475569">0.01 M AgNO� (small volume)</text>

  <!-- Ag+ arrows -->
  <path d="M280 220 L360 250" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)" fill="none"/>
  <text x="265" y="215" font-family="Segoe UI, sans-serif" font-size="10" fill="#2563eb">Agz</text>

  <!-- Ag anode -->
  <rect x="260" y="105" width="16" height="120" rx="2" fill="#cbd5e1" stroke="#94a3b8"/>
  <text x="268" y="98" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#475569">Ag anode (+)</text>

  <!-- Cathode coin -->
  <circle cx="430" cy="250" r="28" fill="#b45309" stroke="#92400e" stroke-width="1.5"/>
  <circle cx="430" cy="250" r="22" fill="#d97706" opacity="0.5"/>
  <text x="430" y="254" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#fff">Cu</text>
  <text x="430" y="115" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#334155">Object ()</text>
  <text x="490" y="250" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">silver deposits</text>

  <!-- 3V pack -->
  <rect x="580" y="150" width="50" height="36" rx="4" fill="#fef3c7" stroke="#334155"/>
  <text x="605" y="172" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700">3V</text>

  <!-- Circuit with ammeter in series -->
  <path d="M268 105 L268 55 L400 55" stroke="#334155" stroke-width="2" fill="none"/>
  <path d="M430 222 L430 55 L520 55 L605 55 L605 150" stroke="#334155" stroke-width="2" fill="none"/>
  <path d="M605 186 L605 280 L430 280 L430 278" stroke="#334155" stroke-width="2" fill="none"/>

  <!-- Ammeter -->
  <circle cx="460" cy="55" r="22" fill="#fff" stroke="#0d9488" stroke-width="2"/>
  <text x="460" y="52" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="700" fill="#0d9488">A</text>
  <text x="460" y="64" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#64748b">mA</text>
  <text x="460" y="38" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#64748b">multimeter in series</text>

  <!-- Faraday box -->
  <rect x="24" y="345" width="672" height="78" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="40" y="368" font-family="Segoe UI, sans-serif" font-size="11" fill="#334155">Agz + e{ � Ag(s)     Record I every 3060 s and total time t</text>
  <text x="40" y="388" font-family="Segoe UI, sans-serif" font-size="11" fill="#334155">Q = I � t  �  n = Q/F  �  m_Ag  �  thickness d = m/(��A)</text>
  <text x="40" y="408" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">Estimate plated area A before starting (coin face, washer ring, etc.)</text>
</svg>
