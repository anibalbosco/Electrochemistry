<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img" aria-labelledby="title desc">
  <title id="title">Galvanic cell  zinc and copper in saltwater</title>
  <desc id="desc">Spontaneous galvanic cell with zinc anode corroding and copper cathode in saltwater, producing measurable voltage.</desc>
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="720" height="380" fill="#f8fafc"/>
  <text x="360" y="28" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Session 5 - Galvanic cell (Zn + Cu in saltwater)</text>

  <!-- Beaker -->
  <path d="M200 100 L200 300 L520 300 L520 100" fill="none" stroke="#64748b" stroke-width="2"/>
  <rect x="202" y="160" width="316" height="138" fill="#e0f2fe" opacity="0.6"/>
  <text x="360" y="230" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#0369a1">Saltwater (corrosion demo only)</text>

  <!-- Zn anode -->
  <rect x="270" y="115" width="16" height="130" rx="2" fill="#94a3b8" stroke="#64748b"/>
  <text x="278" y="108" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#475569">Zn</text>
  <text x="230" y="175" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">anode</text>
  <text x="230" y="189" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">corrodes</text>

  <!-- Cu cathode -->
  <rect x="430" y="115" width="16" height="130" rx="2" fill="#b45309" stroke="#92400e"/>
  <text x="438" y="108" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#92400e">Cu</text>
  <text x="480" y="175" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">cathode</text>
  <text x="480" y="189" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">protected</text>

  <!-- External wire + meter -->
  <path d="M278 115 L278 65 L438 65 L438 115" stroke="#334155" stroke-width="2.5" fill="none"/>
  <path d="M320 65 L395 65" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)" fill="none"/>
  <rect x="330" y="68" width="56" height="32" rx="5" fill="#fff" stroke="#0d9488" stroke-width="1.5"/>
  <text x="358" y="88" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#0d9488">~1.1V</text>

  <!-- Reaction box -->
  <rect x="24" y="320" width="672" height="48" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="360" y="342" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#334155">Zn &#x2192; Zn&#xb2;&#x207a; + 2e&#x207b;  (oxidation at anode)  |  Spontaneous - produces electricity like Session 1</text>
  <text x="360" y="358" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">More active metal becomes anode; less active metal becomes cathode</text>
</svg>
