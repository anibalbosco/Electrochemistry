<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Fruit battery  single galvanic cell</title>
  <desc id="desc">Zinc anode and copper cathode in a lemon with electron flow through the external wire and ion flow in the fruit juice electrolyte.</desc>
  <defs>
    <linearGradient id="lemonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#0d9488"/>
    </marker>
  </defs>
  <rect width="720" height="420" fill="#f8fafc"/>
  <text x="360" y="28" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Session 1 - Single fruit cell (galvanic)</text>

  <!-- Lemon cross-section -->
  <ellipse cx="360" cy="230" rx="155" ry="115" fill="url(#lemonGrad)" stroke="#d97706" stroke-width="2"/>
  <ellipse cx="360" cy="230" rx="95" ry="70" fill="#fef3c7" opacity="0.85"/>
  <text x="360" y="238" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#92400e">Fruit juice (H&#x207a; electrolyte)</text>

  <!-- Zn anode -->
  <rect x="248" y="95" width="14" height="170" rx="3" fill="#94a3b8" stroke="#64748b" stroke-width="1.5"/>
  <rect x="250" y="95" width="10" height="170" fill="#cbd5e1"/>
  <text x="255" y="82" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#334155">Zn</text>
  <text x="210" y="200" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748b">Anode (&#x2212;)</text>
  <text x="210" y="216" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">oxidation</text>

  <!-- Cu cathode -->
  <rect x="458" y="95" width="14" height="170" rx="3" fill="#b45309" stroke="#92400e" stroke-width="1.5"/>
  <text x="465" y="82" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#92400e">Cu</text>
  <text x="510" y="200" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748b">Cathode (+)</text>
  <text x="510" y="216" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">reduction</text>

  <!-- Ion arrows in electrolyte -->
  <text x="310" y="280" font-family="Segoe UI, sans-serif" font-size="11" fill="#0d9488">H&#x207a; &#x2192;</text>
  <text x="300" y="300" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748b">Zn&#xb2;&#x207a; &#x2192;</text>
  <path d="M330 275 L400 275" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrowTeal)" fill="none"/>
  <path d="M400 295 L330 295" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowTeal)" fill="none"/>

  <!-- External circuit -->
  <path d="M465 95 L465 55 L255 55 L255 95" stroke="#334155" stroke-width="2.5" fill="none"/>
  <path d="M300 55 L380 55" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)" fill="none"/>
  <text x="340" y="48" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#dc2626">e&#x207b; flow</text>

  <!-- Multimeter -->
  <rect x="310" y="58" width="80" height="36" rx="6" fill="#fff" stroke="#334155" stroke-width="1.5"/>
  <text x="350" y="81" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#0d9488">0.9 V</text>

  <!-- Reactions -->
  <rect x="24" y="340" width="672" height="68" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="40" y="362" font-family="Segoe UI, sans-serif" font-size="11" fill="#334155">Anode:  Zn &#x2192; Zn&#xb2;&#x207a; + 2e&#x207b;</text>
  <text x="40" y="382" font-family="Segoe UI, sans-serif" font-size="11" fill="#334155">Cathode:  2H&#x207a; + 2e&#x207b; &#x2192; H&#x2082;</text>
  <text x="380" y="362" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748b">Electrons through wire</text>
  <text x="380" y="382" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748b">Ions through fruit juice</text>
</svg>
