<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="title desc">
  <title id="title">Copper electroplating cell</title>
  <desc id="desc">Electrolytic cell with copper anode dissolving and copper ions depositing on a steel cathode powered by a 9 V battery.</desc>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="720" height="440" fill="#f8fafc"/>
  <text x="360" y="28" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Session 2  Copper electroplating (electrolytic cell)</text>

  <!-- Beaker -->
  <path d="M220 120 L220 320 L500 320 L500 120" fill="none" stroke="#64748b" stroke-width="2"/>
  <path d="M210 120 L510 120" stroke="#64748b" stroke-width="2"/>
  <rect x="222" y="180" width="276" height="138" fill="#bae6fd" opacity="0.55"/>
  <text x="360" y="250" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#0369a1">Cu�z solution</text>

  <!-- Cu2+ arrows toward cathode -->
  <path d="M320 220 L390 240" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)" fill="none"/>
  <path d="M360 210 L410 250" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)" fill="none"/>
  <text x="300" y="205" font-family="Segoe UI, sans-serif" font-size="10" fill="#2563eb">Cu�z</text>

  <!-- Anode Cu -->
  <rect x="270" y="95" width="18" height="130" rx="2" fill="#b45309" stroke="#92400e"/>
  <text x="279" y="88" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#92400e">Cu anode</text>
  <text x="240" y="150" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">(+) dissolves</text>

  <!-- Cathode nail -->
  <rect x="430" y="110" width="10" height="115" fill="#64748b"/>
  <polygon points="435,95 440,110 430,110" fill="#64748b"/>
  <rect x="426" y="110" width="18" height="40" fill="#b45309" opacity="0.7"/>
  <text x="435" y="88" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#334155">Steel nail</text>
  <text x="470" y="150" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">() plated</text>

  <!-- Battery -->
  <rect x="560" y="130" width="36" height="70" rx="4" fill="#fef3c7" stroke="#334155" stroke-width="1.5"/>
  <text x="578" y="158" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#334155">9V</text>
  <text x="578" y="175" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#64748b">+ top</text>
  <text x="578" y="188" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#64748b"> bottom</text>

  <!-- Wires -->
  <path d="M288 95 L288 60 L578 60 L578 130" stroke="#dc2626" stroke-width="2" fill="none"/>
  <path d="M435 95 L435 75 L578 75 L578 200" stroke="#334155" stroke-width="2" fill="none"/>
  <text x="430" y="68" font-family="Segoe UI, sans-serif" font-size="10" fill="#dc2626">to (+)</text>
  <text x="500" y="218" font-family="Segoe UI, sans-serif" font-size="10" fill="#334155">to ()</text>

  <!-- Optional resistor -->
  <rect x="340" y="52" width="50" height="18" rx="3" fill="#fff" stroke="#64748b"/>
  <path d="M345 61 L355 61 L360 55 L370 67 L380 55 L385 61" stroke="#64748b" fill="none"/>
  <text x="365" y="48" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#64748b">optional resistor</text>

  <!-- Reactions box -->
  <rect x="24" y="350" width="672" height="72" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="40" y="374" font-family="Segoe UI, sans-serif" font-size="11" fill="#334155">Cathode ():  Cu�z + 2e{ � Cu(s)   copper deposits on nail</text>
  <text x="40" y="394" font-family="Segoe UI, sans-serif" font-size="11" fill="#334155">Anode (+):   Cu(s) � Cu�z + 2e{   copper dissolves, replenishes bath</text>
  <text x="40" y="414" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">Power supply drives non-spontaneous reaction (opposite of Session 1 fruit battery)</text>
</svg>
